{% extends 'applications/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="form-card">
            <div class="text-center mb-4">
                <div class="form-icon-wrapper">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <h2 class="form-title">Формирование отчета</h2>
                <p class="form-subtitle">Выберите период для экспорта данных</p>
            </div>

            <form method="get" action="{% url 'export_monthly_report' %}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Месяц</label>
                        <select name="month" class="form-select">
                            <option value="1">Январь</option>
                            <option value="2">Февраль</option>
                            <option value="3">Март</option>
                            <option value="4">Апрель</option>
                            <option value="5">Май</option>
                            <option value="6">Июнь</option>
                            <option value="7">Июль</option>
                            <option value="8">Август</option>
                            <option value="9">Сентябрь</option>
                            <option value="10">Октябрь</option>
                            <option value="11">Ноябрь</option>
                            <option value="12" selected>Декабрь</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Год</label>
                        <select name="year" class="form-select">
                            {% for year in years %}
                                <option value="{{ year }}" {% if year == now.year %}selected{% endif %}>{{ year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Формат отчета</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="format" id="excel" value="excel" checked>
                            <label class="form-check-label" for="excel">
                                <i class="fas fa-file-excel text-success"></i> Excel (.xlsx)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="format" id="pdf" value="pdf">
                            <label class="form-check-label" for="pdf">
                                <i class="fas fa-file-pdf text-danger"></i> PDF
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary-custom w-100">
                        <i class="fas fa-download me-2"></i> Сформировать отчет
                    </button>
                </div>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <a href="{% url 'application_list' %}" class="btn-outline-custom w-100">
                    <i class="fas fa-arrow-left me-2"></i> Вернуться к списку заявок
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
