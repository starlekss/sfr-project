{% extends 'applications/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="form-card">
            <div class="text-center mb-4">
                <div class="form-icon-wrapper">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h2 class="form-title">Личный кабинет гражданина</h2>
                <p class="form-subtitle">Войдите или зарегистрируйтесь</p>
            </div>

            <!-- Форма входа -->
            <form method="post" action="{% url 'citizen_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">СНИЛС (логин)</label>
                    <div class="input-with-icon">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="snils" class="form-control" placeholder="123-456-789 01" required>
                    </div>
                    <div class="form-hint">Введите СНИЛС, указанный при подаче заявки</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Пароль</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary-custom w-100">
                    <i class="fas fa-sign-in-alt me-2"></i> Войти
                </button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="mb-2">Нет учётной записи?</p>
                <a href="{% url 'citizen_register' %}" class="btn-outline-custom">
                    <i class="fas fa-user-plus me-2"></i> Зарегистрироваться
                </a>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted">
                    <i class="fas fa-lock me-1"></i>
                    Ваши данные защищены
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
