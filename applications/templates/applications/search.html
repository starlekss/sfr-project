{% extends 'applications/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="form-card">
            <div class="text-center mb-4">
                <div class="form-icon-wrapper">
                    <i class="fas fa-search"></i>
                </div>
                <h2 class="form-title">Проверка статуса заявки</h2>
                <p class="form-subtitle">Введите номер заявки или СНИЛС для отслеживания</p>
            </div>

            <ul class="nav nav-pills nav-fill mb-4" id="searchTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#by-number" type="button">
                        <i class="fas fa-hashtag me-2"></i>По номеру
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#by-snils" type="button">
                        <i class="fas fa-id-card me-2"></i>По СНИЛС
                    </button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="by-number">
                    <form method="get" action="{% url 'search_application' %}">
                        <div class="mb-4">
                            <label class="form-label">Номер заявки</label>
                            <div class="input-with-icon">
                                <i class="fas fa-hashtag"></i>
                                <input type="number" name="app_id" class="form-control" placeholder="Введите номер заявки" required>
                            </div>
                            <div class="form-hint">Номер был выдан при подаче заявления</div>
                        </div>
                        <button type="submit" class="btn-primary-custom w-100">
                            <i class="fas fa-search me-2"></i> Найти заявку
                        </button>
                    </form>
                </div>

                <div class="tab-pane fade" id="by-snils">
                    <form method="get" action="{% url 'search_application' %}">
                        <div class="mb-4">
                            <label class="form-label">СНИЛС</label>
                            <div class="input-with-icon">
                                <i class="fas fa-id-card"></i>
                                <input type="text" name="query" class="form-control" placeholder="XXX-XXX-XXX XX" required>
                            </div>
                            <div class="form-hint">Все заявки, поданные по этому СНИЛС</div>
                        </div>
                        <button type="submit" class="btn-primary-custom w-100">
                            <i class="fas fa-search me-2"></i> Найти заявки
                        </button>
                    </form>
                </div>
            </div>

            <div class="upload-note mt-4">
                <i class="fas fa-info-circle me-2"></i>
                <small>Не можете найти заявку? Позвоните на горячую линию: 8-800-100-00-01</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
